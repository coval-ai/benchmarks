#
# Tag release pipeline (v* tags):
#   1. Build and push runner + api images with THREE tags per image:
#        :<ref_name>  (e.g. :v0.1.0)
#        :latest
#        :<sha>       (keeps sha↔tag mapping recoverable)
#   2. Fire repository_dispatch to coval-ai/benchmark-infra with the tag-named
#      image refs so bump-images.yml deploys the named release, not the raw SHA.
#
# :latest is ONLY pushed from this workflow (not from release.yml).

name: Tag Release

on:
  push:
    tags:
      - 'v*'

# Never cancel a tag release mid-push.
concurrency:
  group: tag-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }} (${{ github.ref_name }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    strategy:
      matrix:
        include:
          - image: runner
            dockerfile: Dockerfile
          - image: api
            dockerfile: Dockerfile.api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to GCP via WIF — no JSON key involved.
      # runner-deploy SA is bound to coval-ai/benchmarks refs/tags/v* by the
      # wif-binding TF module.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v5
        with:
          context: runner
          file: runner/${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-${{ matrix.image }}:${{ github.ref_name }}
            us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-${{ matrix.image }}:latest
            us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  dispatch-infra:
    name: Dispatch image-bump to benchmark-infra
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      # Dispatch uses the tag-named image refs so infra deploys the named release.
      - name: Fire repository_dispatch → coval-ai/benchmark-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: coval-ai/benchmark-infra
          event-type: image-bump
          client-payload: >-
            {
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "runner_image": "us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-runner:${{ github.ref_name }}",
              "api_image": "us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-api:${{ github.ref_name }}"
            }
