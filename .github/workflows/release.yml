#
# Push-to-main release pipeline:
#   1. Build and push runner + api images to Artifact Registry (tagged :<sha>).
#   2. Fire repository_dispatch to coval-ai/benchmark-infra so bump-images.yml
#      can roll the Cloud Run Job and Service to the new images.
#
# No `:latest` tag is pushed here — that is reserved for tag.yml (v* tags only).

name: Release

on:
  push:
    branches:
      - main

# Never cancel a release mid-push — leaving AR in a half-pushed state would
# mean the infra dispatch could reference an image that doesn't exist yet.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    strategy:
      matrix:
        include:
          - image: runner
            dockerfile: Dockerfile
          - image: api
            dockerfile: Dockerfile.api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to GCP via WIF — no JSON key involved.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: runner
          file: runner/${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  dispatch-infra:
    name: Dispatch image-bump to benchmark-infra
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      - name: Fire repository_dispatch → coval-ai/benchmark-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: coval-ai/benchmark-infra
          event-type: image-bump
          client-payload: >-
            {
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "runner_image": "us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-runner:${{ github.sha }}",
              "api_image": "us-east1-docker.pkg.dev/coval-benchmarks-prod/runner/coval-bench-api:${{ github.sha }}"
            }
