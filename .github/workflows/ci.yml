#
# PR gate: lint + type-check + tests + secret scan + docker build (no push)
# Triggers on every pull_request targeting main.

name: CI

on:
  pull_request:
    branches:
      - main

# Cancel prior runs for the same PR branch on re-push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: runner/uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: runner
        run: uv sync --frozen --dev

      # -----------------------------------------------------------------------
      # Lint & format
      # -----------------------------------------------------------------------
      - name: ruff check
        working-directory: runner
        run: uv run ruff check .

      - name: ruff format check
        working-directory: runner
        run: uv run ruff format --check .

      # -----------------------------------------------------------------------
      # Type checking
      # -----------------------------------------------------------------------
      - name: mypy strict
        working-directory: runner
        run: uv run mypy --strict src

      # -----------------------------------------------------------------------
      # Tests
      # -----------------------------------------------------------------------
      # pytest-socket blocks all network calls except the embedded Postgres
      # spun up by pytest-postgresql on the loopback interface.
      - name: pytest
        working-directory: runner
        run: uv run pytest -q --disable-socket --allow-unix-socket --allow-hosts=127.0.0.1,::1

      # -----------------------------------------------------------------------
      # License scan — fail if any dep carries a copyleft license (GPL/AGPL/SSPL/BUSL).
      # LGPL (psycopg, soxr, mirakuru, pytest-postgresql) is intentionally allowed.
      # -----------------------------------------------------------------------
      - name: pip-licenses
        working-directory: runner
        run: |
          uv run pip-licenses \
            --fail-on "GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;BUSL-1.1"

      # -----------------------------------------------------------------------
      # Secret scan — gitleaks/gitleaks-action@v2 now requires a paid license
      # for org-owned repos (public or private). Use the OSS CLI binary
      # directly instead, which is free and equivalent for our use case.
      # -----------------------------------------------------------------------
      - name: gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --verbose

      # -----------------------------------------------------------------------
      # Docker build — confirm both Dockerfiles build; no push.
      # GHA cache via buildx gha backend.
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker build — runner image
        uses: docker/build-push-action@v7
        with:
          context: runner
          file: runner/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build — api image
        uses: docker/build-push-action@v7
        with:
          context: runner
          file: runner/Dockerfile.api
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Methodology marker reminder — advisory only (warns, never blocks).
  # If a PR changes how a metric is computed (WER normalization, TTFT/TTFA
  # definitions) or the eval dataset, the timeline charts should get a
  # methodology marker. Warn when those paths change but the curated marker
  # file (web/lib/config/methodologyChanges.ts) was not touched.
  # Provider add/exclude (orchestrator.py) is intentionally NOT watched — it
  # changes for routine reasons and is left to human judgment.
  # ---------------------------------------------------------------------------
  methodology-gate:
    name: Methodology marker check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Advisory only: never let this job block a PR, even on an unexpected error.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Warn on methodology change without a marker
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          BASE="origin/$BASE_REF"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          SENSITIVE=$(echo "$CHANGED" | grep -E \
            'runner/src/coval_bench/metrics/(wer|ttft|ttfa|ttfs)\.py|runner/src/coval_bench/datasets/|docs/methodology\.md' || true)
          if [ -n "$SENSITIVE" ] && ! echo "$CHANGED" | grep -q 'web/lib/config/methodologyChanges\.ts'; then
            echo "::warning::Methodology-sensitive files changed but web/lib/config/methodologyChanges.ts was not updated. If this PR changes how a metric is computed or the eval dataset, add a methodology marker so the timeline charts explain the step."
            echo "Changed methodology-sensitive files:"
            echo "$SENSITIVE"
          fi
