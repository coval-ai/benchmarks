#
# Keep GitHub Actions action versions current.
# Python and Docker dependencies are managed by uv.lock — Dependabot is NOT
# configured for those ecosystems (uv.lock is not a format Dependabot groks).

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
