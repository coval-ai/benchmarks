[pytest]
asyncio_mode = auto
addopts = -ra --strict-markers --cov=coval_bench --cov-report=term-missing --cov-fail-under=0
markers =
    live: requires live provider API keys (deselect with -m "not live")
    e2e: end-to-end tests requiring full stack
